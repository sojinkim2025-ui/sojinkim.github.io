<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            background-color: #EBE2D9;
            color: #333;
            font-family: Arial, sans-serif;
        }
        .hero {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }
        .text-content {
            width: 60%;
            padding: 20px;
        }
        .profile-photo {
            width: 30%;
            height: auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #B0CAE1;
        }
        .profile-photo img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="text-content">
            <h1>Welcome to My Portfolio</h1>
            <p>This is where I showcase my work and professional experiences.</p>
        </div>
        <div class="profile-photo">
            <img src="profile.jpg" alt="Profile Photo" />
        </div>
    </header>
    <footer>
        <p>Please upload your profile image to the repository root as `profile.jpg`.</p>
    </footer>
</body>
</html>
